<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>首页</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; }
    .post { border-bottom: 1px solid #ccc; padding: 15px 0; }
    .post h3 { margin: 0 0 5px; }
    .post small { color: #666; }
    .actions { margin: 20px 0; }
    a { color: #06c; text-decoration: none; margin-right: 15px; }
  </style>
</head>
<body>
  <div class="actions">
    {% if current_user.is_authenticated %}
      <span>欢迎, {{ current_user.username }}</span>
      <a href="{{ url_for('create') }}">新建文章</a>
      <a href="{{ url_for('logout') }}">注销</a>
    {% else %}
      <a href="{{ url_for('login') }}">登录</a>
      <a href="{{ url_for('register') }}">注册</a>
    {% endif %}
  </div>

  <h2>文章列表</h2>
  {% for post in contents %}
    <div class="post">
      <h3>{{ post.title }}</h3>
      <p>{{ post.content }}</p>
      <small>作者: {{ post.author.username }} | 发布于: {{ post.created_at.strftime('%Y-%m-%d %H:%M') }}</small>
    </div>
  {% else %}
    <p>暂无文章。</p>
  {% endfor %}
</body>
</html>
